    <style>
        :root {
            --gold: #C5A059;
            --gold-light: #E8D5B5;
            --bg-warm: #faf9f6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-warm); 
            color: #1a1a1a; 
            overflow-x: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        
        .serif { font-family: 'Playfair Display', serif; }
        
        .text-gold { color: var(--gold); }
        .bg-gold { background-color: var(--gold); }

        /* Custom Elegant Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Hardware Acceleration untuk elemen berat */
        .glass { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(30px) saturate(200%); 
            -webkit-backdrop-filter: blur(30px) saturate(200%); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            transform: translateZ(0);
        }
        
        .h-screen-dvh { height: 100dvh; }
        
        /* PIN Dots Optimized & Luxury */
        .pin-dot { 
            width: 12px; height: 12px; 
            border-radius: 50%; 
            border: 1px solid #a0a0a0; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            will-change: transform, background-color;
        }
        .pin-dot.active { background: var(--gold); border-color: var(--gold); transform: scale(1.2); box-shadow: 0 0 10px rgba(197, 160, 89, 0.3); }
        
        /* Keypad Boutique Style */
        .keypad-btn { 
            width: 76px; height: 76px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; 
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid rgba(255,255,255,0.8);
            font-size: 2rem; font-weight: 200; 
            color: #2a2a2a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02), inset 0 0 0 rgba(255,255,255,0.5);
            transition: all 0.15s ease-out; 
            -webkit-tap-highlight-color: transparent; 
            will-change: transform;
        }
        .keypad-btn:active { 
            background: rgba(232, 213, 181, 0.3); 
            transform: scale(0.9); 
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
            border-color: var(--gold-light);
        }
        
        /* Cinematic Photo Card */
        .photo-card { 
            aspect-ratio: 4/5; 
            border-radius: 24px; 
            overflow: hidden; 
            position: relative; 
            background: #f0ebe1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04); 
            cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
            transform: translateZ(0);
            will-change: transform;
        }
        .photo-card:active { transform: scale(0.94); }
        .photo-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .photo-card.loaded::after { opacity: 1; }
        
        .photo-card img {
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-out;
            will-change: opacity, transform;
            transform: scale(1.05);
        }
        .photo-card img.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* Luxury Heart Animation */
        .heart-burst { animation: heartBurst 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes heartBurst { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

        /* Tabs */
        .tab-content { display: none; opacity: 0; transition: opacity 0.4s ease-out; }
        .tab-content.active { display: block; opacity: 1; animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .shake { animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; transform: translate3d(0, 0, 0); }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
        
        /* Premium Nav Bar */
        .ios-tab-bar { 
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateZ(0); 
            width: 85%; max-width: 380px; height: 4.5rem; 
            border-radius: 2.25rem; z-index: 50; 
            display: flex; align-items: center; justify-content: space-around; 
            padding: 0 1.5rem; 
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(255,255,255,1) inset;
        }
        .nav-item { transition: all 0.3s ease; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--gold); transform: translateY(-2px); }
        
        /* Deep Blur Lightbox */
        #lightbox { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; flex-direction: column; align-items: center; justify-content: center; 
            opacity: 0; transition: opacity 0.4s ease-out; 
        }
        #lightbox.visible { display: flex; opacity: 1; }
        #lightbox img { 
            max-width: 100%; max-height: 80vh; 
            border-radius: 20px; object-fit: contain; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            transform: scale(0.95) translateY(10px); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        #lightbox.visible img { transform: scale(1) translateY(0); }

        .luxury-loader { width: 24px; height: 24px; border: 2px solid rgba(197, 160, 89, 0.3); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #yt-player { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>

    <script>
        window.onerror = function (msg, url, line, col, error) {
            return true; 
        };

        let audioCtx = null;
        function playClickSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.04);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.04);
            } catch(e) {}
        }

        function playSuccessSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const freqs = [523.25, 659.25, 783.99, 1046.50]; // Lonceng emas berjenjang
                freqs.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.08);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.06, now + i * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.5);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.5);
                });
            } catch(e) {}
        }

        (function() {
            const originalError = console.error;
            const originalWarn = console.warn;
            
            const isFirebaseNetworkLog = (args) => {
                const joined = args.map(arg => {
                    try {
                        return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
                    } catch(e) { return ''; }
                }).join(' ').toLowerCase();
                
                return joined.includes('firebase') || 
                       joined.includes('firestore') || 
                       joined.includes('backend didn') || 
                       joined.includes('could not reach cloud') ||
                       joined.includes('connection');
            };

            console.error = function(...args) {
                if (isFirebaseNetworkLog(args)) return; 
                originalError.apply(console, args);
            };

            console.warn = function(...args) {
                if (isFirebaseNetworkLog(args)) return; 
                originalWarn.apply(console, args);
            };
        })();

        const firebaseConfig = {
            apiKey: "AIzaSyBFDBKLmV-51mh7ztLmLMhFHB547EaZcZQ",
            authDomain: "newapp-27599.firebaseapp.com",
            databaseURL: "https://newapp-27599-default-rtdb.firebaseio.com",
            projectId: "newapp-27599",
            storageBucket: "newapp-27599.firebasestorage.app",
            messagingSenderId: "56126723371",
            appId: "1:56126723371:web:5e73e34a819329364fe16e",
            measurementId: "G-C79962M53N"
        };

        firebase.initializeApp(firebaseConfig);
        firebase.setLogLevel('silent');
        
        const db = firebase.firestore();
        db.settings({ 
            experimentalForceLongPolling: true,
            useFetchStreams: false
        });

        const CORRECT_PIN = "1212";
        const YT_ID = "wbz5pGyWOP4"; 
        
        let currentPin = "";
        let photos = [];
        let isMusicPlaying = false;
        let ytPlayer;
        let isProcessingInput = false;

        let isUsingCloud = false;
        let cloudUnsubscribe = null;

        function safeCreateIcons() {
            try {
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            } catch (e) {
                console.warn("Lucide icons failed to load gracefully:", e);
            }
        }

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '1', width: '1', videoId: YT_ID,
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': YT_ID }
            });
        }

        function toggleMusic() {
            if (!ytPlayer || typeof ytPlayer.playVideo !== 'function') return;
            isMusicPlaying = !isMusicPlaying;
            
            playClickSound(); // Umpan balik suara klik
            
            const btn = document.getElementById('musicBtn');
            const icon = btn ? btn.querySelector('svg, i') : null;

            if (isMusicPlaying) {
                ytPlayer.playVideo();
                if (btn) {
                    btn.classList.add('bg-white', 'text-gold', 'shadow-md');
                    btn.classList.remove('text-gray-400');
                }
                if (icon) {
                    icon.classList.add('fill-current', 'heart-burst');
                }
            } else {
                ytPlayer.pauseVideo();
                if (btn) {
                    btn.classList.remove('bg-white', 'text-gold', 'shadow-md');
                    btn.classList.add('text-gray-400');
                }
                if (icon) {
                    icon.classList.remove('fill-current', 'heart-burst');
                }
            }
        }

        function handleInput(key) {
            if (isProcessingInput) return; 
            
            playClickSound(); // Efek suara klik taktil saat tombol keypad ditekan
            
            if (key === '⌫') {
                currentPin = currentPin.slice(0, -1);
            } else if (currentPin.length < 4) {
                currentPin += key;
                if (window.navigator.vibrate) window.navigator.vibrate(10);
            }
            
            updateDots();
            
            if (currentPin.length === 4) {
                isProcessingInput = true;
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        if (currentPin === CORRECT_PIN) unlock();
                        else shakeKeypad();
                    }, 200);
                });
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                if (i < currentPin.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function shakeKeypad() {
            const display = document.getElementById('pinDisplay');
            display.classList.add('shake');
            if (window.navigator.vibrate) window.navigator.vibrate([30, 30, 30]);
            
            setTimeout(() => {
                display.classList.remove('shake');
                currentPin = ""; 
                updateDots();
                isProcessingInput = false;
            }, 400);
        }

        function unlock() {
            playSuccessSound(); // Nada penyambutan dimainkan saat PIN benar
            const lock = document.getElementById('lockScreen');
            lock.style.opacity = '0';
            lock.style.transform = 'translateY(-10%) scale(1.05)';
            
            setTimeout(() => {
                lock.style.display = 'none';
                const app = document.getElementById('appContent');
                app.classList.remove('hidden');
                
                requestAnimationFrame(() => {
                    app.classList.add('opacity-100');
                    initGallery();
                });
            }, 600); 
        }

        let fallbackTimer = setTimeout(() => {
            console.warn("Firestore timed out or was blocked. Falling back to Local Storage mode.");
            useLocalFallback();
        }, 3000); 

        function initGallery() {
            try {
                cloudUnsubscribe = db.collection("vault_photos").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                    clearTimeout(fallbackTimer);
                    isUsingCloud = true;
                    photos = [];
                    snapshot.forEach(doc => photos.push({ id: doc.id, ...doc.data() }));
                    renderGalleryFast();
                    
                    const indicator = document.getElementById('cloudIndicator');
                    const statusText = document.getElementById('cloudStatus');
                    
                    if (statusText && indicator) {
                        statusText.innerText = "Secured Cloud";
                        statusText.classList.remove('text-amber-600');
                        statusText.classList.add('text-gold');
                        indicator.className = "w-1.5 h-1.5 rounded-full bg-green-400 transition-colors duration-500 shadow-[0_0_5px_rgba(74,222,128,0.5)]";
                    }
                }, (error) => {
                    console.warn("Firebase restricted or unreachable:", error);
                    clearTimeout(fallbackTimer);
                    useLocalFallback();
                });
            } catch (err) {
                console.error("Firestore initialization failed:", err);
                clearTimeout(fallbackTimer);
                useLocalFallback();
            }
        }

        function useLocalFallback() {
            if (isUsingCloud) return; 
            
            const indicator = document.getElementById('cloudIndicator');
            const statusText = document.getElementById('cloudStatus');
            
            if (statusText && indicator) {
                statusText.innerText = "Local Vault";
                statusText.classList.remove('text-gold');
                statusText.classList.add('text-amber-600');
                indicator.className = "w-1.5 h-1.5 rounded-full bg-amber-500 transition-colors duration-500 shadow-[0_0_5px_rgba(245,158,11,0.5)]";
            }

            loadLocalPhotos();
        }

        function loadLocalPhotos() {
            const localData = localStorage.getItem('vault_photos_v2');
            photos = localData ? JSON.parse(localData) : [];
            renderGalleryFast();
        }

        function renderGalleryFast() {
            const grid = document.getElementById('galleryGrid');
            const favGrid = document.getElementById('favoritesGrid');
            if (!grid || !favGrid) return;

            const fragAll = document.createDocumentFragment();
            const fragFav = document.createDocumentFragment();
            let likedCount = 0;

            photos.forEach(photo => {
                const div = document.createElement('div');
                div.className = "photo-card group";
                div.onclick = () => openLightbox(photo);
                
                const heartClass = photo.liked ? 'text-red-500 fill-current' : 'text-gray-400';
                const btnBg = photo.liked ? 'bg-white/90' : 'bg-white/50';
                
                div.innerHTML = `
                    <div class="absolute top-3 right-3 z-10 transition-transform duration-300 opacity-90 group-hover:opacity-100">
                        <button onclick="toggleLike('${photo.id}', ${photo.liked}, event, this)" class="${btnBg} backdrop-blur-md p-2.5 rounded-full shadow-sm active:scale-90 transition-all border border-white/50">
                            <i data-lucide="heart" class="w-4 h-4 ${heartClass} transition-colors"></i>
                        </button>
                    </div>
                    <img src="${photo.image}" class="w-full h-full object-cover" loading="lazy" onload="this.parentElement.classList.add('loaded'); this.classList.add('loaded')">
                `;
                
                fragAll.appendChild(div);
                
                if(photo.liked) {
                    const favDiv = div.cloneNode(true);
                    favDiv.onclick = () => openLightbox(photo);
                    favDiv.querySelector('button').onclick = (e) => toggleLike(photo.id, photo.liked, e, favDiv.querySelector('button'));
                    fragFav.appendChild(favDiv);
                    likedCount++;
                }
            });
            
            grid.innerHTML = ''; grid.appendChild(fragAll);
            favGrid.innerHTML = ''; favGrid.appendChild(fragFav);

            document.getElementById('stats-total').innerText = photos.length;
            document.getElementById('stats-liked').innerText = likedCount;
            safeCreateIcons();
        }

        async function toggleLike(id, currentStatus, event, btnElement) {
            if(event) event.stopPropagation();
            if(!btnElement) return;
            
            playClickSound(); // Suara sentuhan saat menekan tombol like
            
            const icon = btnElement.querySelector('svg, i');
            if (icon) {
                icon.classList.add('heart-burst');
                setTimeout(() => icon.classList.remove('heart-burst'), 400);

                if (!currentStatus) {
                    btnElement.classList.replace('bg-white/50', 'bg-white/90');
                    icon.classList.replace('text-gray-400', 'text-red-500');
                    icon.classList.add('fill-current');
                } else {
                    btnElement.classList.replace('bg-white/90', 'bg-white/50');
                    icon.classList.replace('text-red-500', 'text-gray-400');
                    icon.classList.remove('fill-current');
                }
            }
            
            if (isUsingCloud && !id.startsWith('local_')) {
                try {
                    await db.collection("vault_photos").doc(id).update({ liked: !currentStatus });
                } catch (error) { console.error("Like sync failed", error); }
            } else {
                photos = photos.map(p => p.id === id ? { ...p, liked: !currentStatus } : p);
                localStorage.setItem('vault_photos_v2', JSON.stringify(photos));
                renderGalleryFast();
            }
        }

        async function deletePhoto(id) {
            if(confirm("Hapus aset ini dari Vault permanen?")) {
                closeLightbox();
                if (isUsingCloud && !id.startsWith('local_')) {
                    try {
                        await db.collection("vault_photos").doc(id).delete();
                    } catch (error) { console.error("Delete sync failed", error); }
                } else {
                    photos = photos.filter(p => p.id !== id);
                    localStorage.setItem('vault_photos_v2', JSON.stringify(photos));
                    renderGalleryFast();
                }
            }
        }

        // --- TAMBAHAN FUNGSI DOWNLOAD ---
        function downloadImage(photoData) {
            const a = document.createElement('a');
            a.href = photoData;
            a.download = `TheVault_Image_${new Date().getTime()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // Efek visual lembut pada tombol download untuk feedback sukses
            const dlBtn = document.getElementById('lightboxDownload');
            if (dlBtn) {
                dlBtn.classList.add('scale-110', 'bg-white/35');
                setTimeout(() => dlBtn.classList.remove('scale-110', 'bg-white/35'), 300);
            }
        }

        function openLightbox(photo) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightboxImg');
            const controls = document.getElementById('lightboxControls');
            
            playClickSound();
            
            lbImg.src = photo.image;
            lb.classList.add('visible');
            
            let lastTap = 0;
            lbImg.ondblclick = () => {
                downloadImage(photo.image);
            };
            lbImg.ontouchend = (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    downloadImage(photo.image);
                    e.preventDefault();
                }
                lastTap = currentTime;
            };
            
            setTimeout(() => {
                controls.classList.remove('translate-y-8', 'opacity-0');
                controls.classList.add('translate-y-0', 'opacity-100');
            }, 50);

            // Set aksi tombol-tombol
            document.getElementById('lightboxDelete').onclick = (e) => {
                e.stopPropagation();
                deletePhoto(photo.id);
            };

            // Set aksi tombol Download yang baru
            document.getElementById('lightboxDownload').onclick = (e) => {
                e.stopPropagation();
                downloadImage(photo.image);
            };

            const likeBtn = document.getElementById('lightboxLike');
            const likeIcon = document.getElementById('lightboxLikeIcon');
            
            likeBtn.onclick = (e) => {
                e.stopPropagation();
                toggleLike(photo.id, photo.liked, null, likeBtn);
                photo.liked = !photo.liked; 
                updateLightboxLikeUI(photo.liked);
            };
            
            function updateLightboxLikeUI(isLiked) {
                if (!likeIcon) return;
                if (isLiked) {
                    likeIcon.classList.replace('text-white', 'text-red-400');
                    likeIcon.classList.add('fill-current');
                } else {
                    likeIcon.classList.replace('text-red-400', 'text-white');
                    likeIcon.classList.remove('fill-current');
                }
            }
            updateLightboxLikeUI(photo.liked);
            safeCreateIcons();
        }

        function closeLightbox() {
            playClickSound();
            const lb = document.getElementById('lightbox');
            const controls = document.getElementById('lightboxControls');
            
            controls.classList.add('translate-y-8', 'opacity-0');
            controls.classList.remove('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                lb.classList.remove('visible');
            }, 300);
        }

        document.getElementById('fileInput').onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            
            document.getElementById('uploadLoader').classList.remove('hidden');
            
            for (let file of files) {
                try {
                    await new Promise(resolve => setTimeout(resolve, 50)); 
                    const base64 = await convertAndCompressAsync(file);
                    
                    if (isUsingCloud) {
                        await db.collection("vault_photos").add({
                            image: base64,
                            liked: false,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        photos.unshift({
                            id: 'local_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            image: base64,
                            liked: false,
                            timestamp: new Date().toISOString()
                        });
                        localStorage.setItem('vault_photos_v2', JSON.stringify(photos));
                        renderGalleryFast();
                    }
                } catch (err) { console.error("Upload error:", err); }
            }
            
            setTimeout(() => {
                document.getElementById('uploadLoader').classList.add('hidden');
            }, 500);
            e.target.value = "";
        };

        function convertAndCompressAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        requestAnimationFrame(() => {
                            setTimeout(() => {
                                const canvas = document.createElement('canvas');
                                const MAX_W = 800;
                                let w = img.width, h = img.height;
                                if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                                
                                canvas.width = w; canvas.height = h;
                                const ctx = canvas.getContext('2d');
                                ctx.imageSmoothingEnabled = true;
                                ctx.imageSmoothingQuality = 'high';
                                ctx.drawImage(img, 0, 0, w, h);
                                resolve(canvas.toDataURL('image/jpeg', 0.6));
                            }, 10);
                        });
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        function switchTab(tab) {
            playClickSound(); // Umpan balik suara klik saat mengganti tab
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${tab}`);
            if (activeTab) activeTab.classList.add('active');
            
            ['gallery', 'love', 'profile'].forEach(t => {
                const el = document.getElementById(`nav-${t}`);
                if (el) {
                    if (t === tab) el.classList.add('active');
                    else el.classList.remove('active');
                }
            });
            
            const app = document.getElementById('appContent');
            if (app) app.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let lastMinute = -1;
        function updateTime() {
            const now = new Date();
            const min = now.getMinutes();
            if (min !== lastMinute) {
                const timeEl = document.getElementById('timeDisplay');
                const dateEl = document.getElementById('dateDisplay');
                if (timeEl) timeEl.innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                if (dateEl) dateEl.innerText = now.toLocaleDateString('en-GB', { weekday: 'long', month: 'long', day: 'numeric' });
                lastMinute = min;
            }
            requestAnimationFrame(updateTime);
        }

        requestAnimationFrame(updateTime);
        safeCreateIcons();
    </script>
</body>
</html>
