<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Vault | Luxury Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (Compat mode for stability) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; color: #1a1a1a; overflow-x: hidden; touch-action: manipulation; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); }
        .h-screen-dvh { height: 100dvh; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #d1d1d1; transition: all 0.2s; }
        .pin-dot.active { background: #1a1a1a; border-color: #1a1a1a; transform: scale(1.1); }
        .keypad-btn { width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255, 255, 255, 0.8); font-size: 1.8rem; font-weight: 300; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .keypad-btn:active { background: rgba(0, 0, 0, 0.05); transform: scale(0.9); }
        .photo-card { aspect-ratio: 4/5; border-radius: 20px; overflow: hidden; position: relative; background: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.3s ease; }
        .photo-card:active { transform: scale(0.98); }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .ios-tab-bar { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 4.5rem; border-radius: 2.25rem; z-index: 50; display: flex; align-items: center; justify-content: space-around; padding: 0 2rem; }
        
        #lightbox { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        #lightbox img { max-width: 100%; max-height: 80vh; border-radius: 15px; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        .loader { width: 18px; height: 18px; border: 2px solid #ddd; border-top: 2px solid #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Hidden YouTube Container */
        #yt-player { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body class="fixed inset-0 overflow-hidden">

    <!-- Hidden YouTube Player -->
    <div id="yt-player"></div>

    <!-- Lightbox Modal -->
    <div id="lightbox" onclick="closeLightbox()">
        <button class="absolute top-10 right-10 text-white opacity-60"><i data-lucide="x" class="w-8 h-8"></i></button>
        <img id="lightboxImg" src="" alt="Enlarged" onclick="event.stopPropagation()">
        <div class="mt-6 flex space-x-6">
            <button id="lightboxDelete" class="p-4 bg-white/10 rounded-full text-white backdrop-blur-md"><i data-lucide="trash-2"></i></button>
            <button id="lightboxLike" class="p-4 bg-white/10 rounded-full text-white backdrop-blur-md"><i data-lucide="heart"></i></button>
        </div>
    </div>

    <!-- Lock Screen -->
    <div id="lockScreen" class="fixed inset-0 z-[80] glass flex flex-col items-center justify-between py-12 h-screen-dvh transition-all duration-700">
        <div class="text-center mt-6">
            <p id="dateDisplay" class="text-sm font-medium tracking-wide opacity-50 mb-1 uppercase"></p>
            <h2 id="timeDisplay" class="text-7xl font-light tracking-tighter">00:00</h2>
            <div class="mt-8 flex justify-center">
                <div class="p-3 bg-white/40 rounded-2xl animate-pulse"><i data-lucide="scan-face" class="w-8 h-8 opacity-40"></i></div>
            </div>
        </div>

        <div class="w-full max-w-xs flex flex-col items-center">
            <div id="pinDisplay" class="flex space-x-6 mb-12">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>
            <div class="grid grid-cols-3 gap-y-5 gap-x-8">
                <button onclick="handleInput(1)" class="keypad-btn">1</button>
                <button onclick="handleInput(2)" class="keypad-btn">2</button>
                <button onclick="handleInput(3)" class="keypad-btn">3</button>
                <button onclick="handleInput(4)" class="keypad-btn">4</button>
                <button onclick="handleInput(5)" class="keypad-btn">5</button>
                <button onclick="handleInput(6)" class="keypad-btn">6</button>
                <button onclick="handleInput(7)" class="keypad-btn">7</button>
                <button onclick="handleInput(8)" class="keypad-btn">8</button>
                <button onclick="handleInput(9)" class="keypad-btn">9</button>
                <div class="w-[72px]"></div>
                <button onclick="handleInput(0)" class="keypad-btn">0</button>
                <button onclick="handleInput('⌫')" class="keypad-btn bg-transparent shadow-none"><i data-lucide="delete" class="w-6 h-6 opacity-40"></i></button>
            </div>
        </div>
        <div class="opacity-20 text-[9px] tracking-[0.3em] uppercase">Private Encryption Active</div>
    </div>

    <!-- Main Content -->
    <main id="appContent" class="hidden opacity-0 transition-opacity duration-1000 h-screen-dvh overflow-y-auto pb-32 bg-[#faf9f6]">
        <header class="sticky top-0 z-40 glass px-6 py-5 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="serif text-xl italic font-medium leading-none">The Vault</h1>
                    <div class="flex items-center space-x-1.5 mt-1">
                        <div id="cloudIndicator" class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                        <p id="cloudStatus" class="text-[9px] uppercase tracking-widest opacity-40">Connecting</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="toggleMusic()" id="musicBtn" class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 transition-all">
                    <i data-lucide="music" class="w-4 h-4"></i>
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center active:scale-90 transition-transform">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            </div>
        </header>

        <div id="uploadLoader" class="hidden px-6 py-4 flex items-center space-x-3 bg-white/50 animate-pulse">
            <div class="loader"></div>
            <p class="text-[10px] uppercase tracking-widest opacity-60">Uploading to Cloud...</p>
        </div>

        <div id="tab-gallery" class="tab-content active px-6 mt-8">
            <h2 class="serif text-4xl italic mb-8">Memories</h2>
            <div id="galleryGrid" class="grid grid-cols-2 gap-4 md:grid-cols-3"></div>
        </div>

        <div id="tab-love" class="tab-content px-6 mt-8">
            <h2 class="serif text-4xl italic mb-8">Favorites</h2>
            <div id="favoritesGrid" class="grid grid-cols-2 gap-4 md:grid-cols-3"></div>
        </div>

        <div id="tab-profile" class="tab-content px-6 mt-12">
            <div class="glass rounded-[40px] p-10 text-center shadow-xl border border-white/50">
                <div class="w-24 h-24 bg-stone-50 rounded-full mx-auto mb-6 flex items-center justify-center border border-stone-200 shadow-inner">
                    <i data-lucide="user" class="w-10 h-10 text-stone-300"></i>
                </div>
                <h3 class="serif text-3xl font-medium mb-1">Private Session</h3>
                <p class="text-[10px] tracking-[0.3em] uppercase opacity-30 mb-10">Secured with newapp-27599</p>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/40 p-6 rounded-[30px] border border-white/60">
                        <p class="text-[9px] uppercase opacity-40 mb-1 font-bold">Total</p>
                        <p id="stats-total" class="text-3xl font-light">0</p>
                    </div>
                    <div class="bg-white/40 p-6 rounded-[30px] border border-white/60">
                        <p class="text-[9px] uppercase opacity-40 mb-1 font-bold">Loved</p>
                        <p id="stats-liked" class="text-3xl font-light">0</p>
                    </div>
                </div>

                <button onclick="location.reload()" class="mt-10 w-full py-5 bg-black text-white rounded-3xl text-sm font-medium flex items-center justify-center space-x-3 active:scale-95 transition-all shadow-lg">
                    <i data-lucide="lock" class="w-4 h-4"></i>
                    <span>Secure Exit</span>
                </button>
            </div>
        </div>

        <nav class="ios-tab-bar glass shadow-2xl border border-white/50">
            <button onclick="switchTab('gallery')" id="nav-gallery" class="transition-all opacity-100 scale-110"><i data-lucide="layout-grid" class="w-6 h-6"></i></button>
            <button onclick="switchTab('love')" id="nav-love" class="transition-all opacity-30"><i data-lucide="heart" class="w-6 h-6"></i></button>
            <button onclick="switchTab('profile')" id="nav-profile" class="transition-all opacity-30"><i data-lucide="user" class="w-6 h-6"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFDBKLmV-51mh7ztLmLMhFHB547EaZcZQ",
            authDomain: "newapp-27599.firebaseapp.com",
            databaseURL: "https://newapp-27599-default-rtdb.firebaseio.com",
            projectId: "newapp-27599",
            storageBucket: "newapp-27599.firebasestorage.app",
            messagingSenderId: "56126723371",
            appId: "1:56126723371:web:5e73e34a819329364fe16e",
            measurementId: "G-C79962M53N"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const CORRECT_PIN = "1212";
        const YT_ID = "wbz5pGyWOP4"; // Link yang Anda berikan
        let currentPin = "";
        let photos = [];
        let isMusicPlaying = false;
        let ytPlayer;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                videoId: YT_ID,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': YT_ID
                },
                events: {
                    'onReady': () => console.log("Music Ready")
                }
            });
        }

        function toggleMusic() {
            if (!ytPlayer) return;
            isMusicPlaying = !isMusicPlaying;
            const btn = document.getElementById('musicBtn');
            if (isMusicPlaying) {
                ytPlayer.playVideo();
                btn.classList.add('bg-black', 'text-white');
                btn.classList.remove('bg-stone-100', 'text-stone-500');
            } else {
                ytPlayer.pauseVideo();
                btn.classList.remove('bg-black', 'text-white');
                btn.classList.add('bg-stone-100', 'text-stone-500');
            }
        }

        function handleInput(key) {
            if (key === '⌫') {
                currentPin = currentPin.slice(0, -1);
            } else if (currentPin.length < 4) {
                currentPin += key;
                if (window.navigator.vibrate) window.navigator.vibrate(10);
            }
            updateDots();
            if (currentPin.length === 4) {
                setTimeout(() => {
                    if (currentPin === CORRECT_PIN) unlock();
                    else shakeKeypad();
                }, 150);
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i < currentPin.length));
        }

        function shakeKeypad() {
            document.getElementById('pinDisplay').classList.add('shake');
            if (window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
            setTimeout(() => {
                document.getElementById('pinDisplay').classList.remove('shake');
                currentPin = ""; updateDots();
            }, 400);
        }

        function unlock() {
            const lock = document.getElementById('lockScreen');
            lock.style.opacity = '0';
            lock.style.transform = 'scale(1.2) translateY(-40px)';
            setTimeout(() => {
                lock.style.display = 'none';
                const app = document.getElementById('appContent');
                app.classList.remove('hidden');
                setTimeout(() => app.classList.add('opacity-100'), 50);
                initGallery();
            }, 700);
        }

        function initGallery() {
            db.collection("vault_photos").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                photos = [];
                snapshot.forEach(doc => photos.push({ id: doc.id, ...doc.data() }));
                renderGallery();
                document.getElementById('cloudStatus').innerText = "Synced";
                document.getElementById('cloudIndicator').classList.replace('bg-red-500', 'bg-green-500');
            });
        }

        async function toggleLike(id, currentStatus, event) {
            if(event) event.stopPropagation();
            await db.collection("vault_photos").doc(id).update({ liked: !currentStatus });
        }

        async function deletePhoto(id, event) {
            if(event) event.stopPropagation();
            if(confirm("Hapus kenangan ini selamanya?")) {
                closeLightbox();
                await db.collection("vault_photos").doc(id).delete();
            }
        }

        function openLightbox(photo) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightboxImg');
            lbImg.src = photo.image;
            lb.style.display = 'flex';
            document.getElementById('lightboxDelete').onclick = () => deletePhoto(photo.id);
            document.getElementById('lightboxLike').onclick = () => toggleLike(photo.id, photo.liked);
            document.getElementById('lightboxLike').style.color = photo.liked ? '#ef4444' : '#fff';
            lucide.createIcons();
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        document.getElementById('fileInput').onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            document.getElementById('uploadLoader').classList.remove('hidden');
            for (let file of files) {
                try {
                    const base64 = await convertAndCompress(file);
                    await db.collection("vault_photos").add({
                        image: base64,
                        liked: false,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) { console.error(err); }
            }
            document.getElementById('uploadLoader').classList.add('hidden');
            e.target.value = "";
        };

        function convertAndCompress(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_W = 800;
                        let w = img.width, h = img.height;
                        if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const favGrid = document.getElementById('favoritesGrid');
            grid.innerHTML = ''; favGrid.innerHTML = '';

            photos.forEach(photo => {
                const html = `
                    <div class="photo-card" onclick='openLightbox(${JSON.stringify(photo)})'>
                        <div class="absolute top-3 right-3 z-10">
                            <button onclick="toggleLike('${photo.id}', ${photo.liked}, event)" class="bg-white/80 backdrop-blur-lg p-2 rounded-full ${photo.liked ? 'text-red-500' : 'text-stone-300'} shadow-md">
                                <i data-lucide="heart" class="w-4 h-4 ${photo.liked ? 'fill-current' : ''}"></i>
                            </button>
                        </div>
                        <img src="${photo.image}" class="w-full h-full object-cover" loading="lazy">
                    </div>`;
                grid.insertAdjacentHTML('beforeend', html);
                if(photo.liked) favGrid.insertAdjacentHTML('beforeend', html);
            });
            
            document.getElementById('stats-total').innerText = photos.length;
            document.getElementById('stats-liked').innerText = photos.filter(p => p.liked).length;
            lucide.createIcons();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            ['gallery', 'love', 'profile'].forEach(t => {
                const el = document.getElementById(`nav-${t}`);
                el.style.opacity = (t === tab ? '1' : '0.2');
                el.style.transform = (t === tab ? 'scale(1.1)' : 'scale(1)');
            });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        setInterval(updateTime, 1000);
        updateTime();
        lucide.createIcons();
    </script>
</body>
</html>
